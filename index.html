<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para o Amor da Minha Vida</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        height:100vh;
        overflow:hidden;
        background: linear-gradient(135deg,#120014,#2a0033,#4d0039);
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        position:relative;
    }

    .container{
        text-align:center;
        z-index:2;
        padding:30px;
        max-width:700px;
        animation: fadeIn 2s ease;
    }

    h1{
        font-size:3rem;
        margin-bottom:20px;
        color:#ff7ad9;
        text-shadow:0 0 15px #ff4fc3;
    }

    p{
        font-size:1.2rem;
        line-height:1.7;
        margin-bottom:25px;
    }

    .heart{
        font-size:90px;
        animation:pulse 1s infinite;
        cursor:pointer;
        user-select:none;
        transition:0.3s;
    }

    .heart:hover{
        transform:scale(1.2);
    }

    .message{
        margin-top:20px;
        font-size:1.3rem;
        min-height:40px;
        color:#ffd6f3;
    }

    button{
        margin-top:25px;
        padding:14px 28px;
        border:none;
        border-radius:15px;
        background:#ff4fc3;
        color:white;
        font-size:1rem;
        cursor:pointer;
        transition:0.3s;
        box-shadow:0 0 15px #ff4fc3;
    }

    button:hover{
        transform:scale(1.08);
        background:#ff74d2;
    }

    .floating-heart{
        position:absolute;
        color:#ff6ad5;
        animation:floatUp linear forwards;
        pointer-events:none;
    }

    @keyframes pulse{
        0%{transform:scale(1);}
        50%{transform:scale(1.12);}
        100%{transform:scale(1);}
    }

    @keyframes fadeIn{
        from{
            opacity:0;
            transform:translateY(20px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    @keyframes floatUp{
        0%{
            transform:translateY(0) scale(1);
            opacity:1;
        }
        100%{
            transform:translateY(-100vh) scale(1.8);
            opacity:0;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Para Você ❤️</h1>

    <p>
        Desde que você entrou na minha vida, tudo ficou mais bonito,
        mais leve e mais vivo.  
        Cada momento com você vale mais do que qualquer coisa no mundo.
    </p>

    <div class="heart" onclick="mostrarMensagem()">
        ❤️
    </div>

    <div class="message" id="mensagem"></div>

    <button onclick="chuvaDeCoracoes()">
        Mostrar o quanto eu te amo
    </button>
</div>

<script>

const mensagens = [
    "Você é meu lugar favorito no mundo ❤️",
    "Eu amo cada detalhe seu 💖",
    "Meu coração é completamente seu 💘",
    "Você transforma meus dias ☀️",
    "Com você tudo faz sentido ✨",
    "Eu escolheria você mil vezes 💞",
    "Seu sorriso é meu ponto fraco 🥺",
    "Você é minha pessoa favorita ❤️"
];

function mostrarMensagem(){
    const texto = mensagens[Math.floor(Math.random() * mensagens.length)];
    document.getElementById("mensagem").innerText = texto;
}

function chuvaDeCoracoes(){

    for(let i=0;i<40;i++){

        const heart = document.createElement("div");

        heart.classList.add("floating-heart");

        heart.innerHTML = "❤";

        heart.style.left = Math.random() * window.innerWidth + "px";

        heart.style.fontSize = (Math.random() * 30 + 15) + "px";

        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },6000);
    }
}

</script>

</body>
    </html>
